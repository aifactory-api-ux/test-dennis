## Interaction Endpoints

### GET /api/interactions?opportunityId=...

| Property         | Value                                  |
|------------------|----------------------------------------|
| HTTP Method      | GET                                    |
| Path             | /api/interactions                      |
| Auth Required    | Yes (`Authorization: Bearer <token>`)  |
| Query Params     | opportunityId: string                  |
| Request Body     | None                                   |
| Response Body    | `Interaction[]`                        |
| Status Codes     | 200                                    |

#### Response Body: Interaction[]

Each `Interaction`:

| Field         | Type                                         |
|---------------|----------------------------------------------|
| id            | string                                       |
| opportunityId | string                                       |
| userId        | string                                       |
| type          | 'call' \| 'email' \| 'meeting' \| 'note'     |
| content       | string                                       |
| createdAt     | string                                       |

