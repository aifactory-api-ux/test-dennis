# API_CONTRACT.md

## Auth Endpoints

### POST /api/auth/login

| Property         | Value                       |
|------------------|----------------------------|
| HTTP Method      | POST                       |
| Path             | /api/auth/login            |
| Auth Required    | No                         |
| Request Body     | `UserLoginRequest`         |
| Response Body    | `UserLoginResponse`        |
| Status Codes     | 200                        |

#### Request Body: UserLoginRequest

| Field    | Type    | Required |
|----------|---------|----------|
| email    | string  | Yes      |
| password | string  | Yes      |

#### Response Body: UserLoginResponse

| Field | Type    |
|-------|---------|
| token | string  |
| user  | object  |

`user` object:

| Field | Type   |
|-------|--------|
| id    | string |
| email | string |
| name  | string |

---

### GET /api/auth/me

| Property         | Value                                         |
|------------------|----------------------------------------------|
| HTTP Method      | GET                                          |
| Path             | /api/auth/me                                 |
| Auth Required    | Yes (`Authorization: Bearer <token>`)        |
| Request Body     | None                                         |
| Response Body    | `{ id: string; email: string; name: string; }`|
| Status Codes     | 200                                          |

#### Response Body

| Field | Type   |
|-------|--------|
| id    | string |
| email | string |
| name  | string |

---

## Opportunity Endpoints

### GET /api/opportunities

| Property         | Value                                  |
|------------------|----------------------------------------|
| HTTP Method      | GET                                    |
| Path             | /api/opportunities                     |
| Auth Required    | Yes (`Authorization: Bearer <token>`)  |
| Request Body     | None                                   |
| Response Body    | `Opportunity[]`                        |
| Status Codes     | 200                                    |

#### Response Body: Opportunity[]

Each `Opportunity`:

| Field     | Type                                                                 |
|-----------|----------------------------------------------------------------------|
| id        | string                                                               |
| name      | string                                                               |
| company   | string                                                               |
| value     | number                                                               |
| stage     | 'lead' \| 'contacted' \| 'qualified' \| 'proposal' \| 'won' \| 'lost'|
| ownerId   | string                                                               |
| createdAt | string                                                               |
| updatedAt | string                                                               |

