
events {
    worker_connections 1024;
}

http {
    upstream auth {
        server auth-service:8001;
    }
    
    upstream opportunity {
        server opportunity-service:8002;
    }
    
    upstream interaction {
        server interaction-service:8003;
    }

    server {
        listen 80;
        
        location /api/auth {
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/opportunities {
            proxy_pass http://opportunity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/interactions {
            proxy_pass http://interaction;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
